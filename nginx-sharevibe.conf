server {
    listen 80;
    listen [::]:80;
    server_name sharevibe.co www.sharevibe.co;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sharevibe.co www.sharevibe.co;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sharevibe.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sharevibe.co/privkey.pem;

    # SSL security headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root directory for React app
    root /var/www/sharevibe/html;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/json;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve dist files
    location / {
        # Try to serve the file directly
        try_files $uri $uri/ /index.html;
        
        # Disable caching for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Prevent access to hidden files
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/sharevibe-access.log;
    error_log /var/log/nginx/sharevibe-error.log;
}
